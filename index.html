/* MCI: Azure Accelerate Partner Nominated - verified from MCI Guide effective March 1, 2026.
   Market A (Sweden). Pre-sales = Assessment & POV. Post-sales = Deployment.
   Source: Microsoft Commercial Partner Incentives Guide, 9 March 2026. */
function getMCI(acr) {
  let pre = 0, preL = "", post = 0, postL = "", ts = "", days = 0;
  if (acr >= 250000) { pre = 25000; preL = "Large (>$250K)"; }
  else if (acr >= 15000) { pre = 15000; preL = "Standard ($15K-$250K)"; }
  if (acr >= 250000) { post = 75000; postL = "$250K-$500K+"; ts = "L"; days = 260; }
  else if (acr >= 100000) { post = 35000; postL = "$100K-$250K"; ts = "M"; days = 200; }
  else if (acr >= 50000) { post = 15000; postL = "$50K-$100K"; ts = "S"; days = 120; }
  else if (acr >= 15000) { post = 6500; postL = "$15K-$50K"; ts = "XS"; days = 120; }
  else if (acr >= 5000) { post = 2000; postL = "$5K-$15K"; ts = "XXS"; days = 120; }
  return { pre, preL, post, postL, ts, days };
}

/* Smart Funding Recommendation Engine
   Analyzes workload mix and suggests optimal funding strategy to maximize total funding.
   Returns array of recommendation objects. */
function getRecommendation(el, ot, tot, pct, ok, rows, mci, stdEcif) {
  const recs = [];
  if (tot === 0) return recs;

  const nonEligACR = ot;
  const eligACR = el;
  const nonEligMci = getMCI(nonEligACR);

  if (ok) {
    const afoEcif = Math.min(tot * 0.5, 500000);
    recs.push({ type: "success", title: "AFO eligible - submit as single nomination",
      body: `All workloads qualify as one AFO project. ECIF ${fmt(afoEcif)} (cash to partner).`,
      action: "Submit via Azure Offer Navigator (field seller nominates)" });

    if (mci.pre > 0) {
      recs.push({ type: "tip", title: "Stack MCI pre-sales for additional " + fmt(mci.pre),
        body: `Partner can self-nominate a separate Assessment+POV (${mci.preL}) for ${fmt(mci.pre)} via Partner Center. This does NOT conflict with AFO post-sales.`,
        action: "Partner submits MCI pre-sales claim independently" });
    }

    if (rows.some(r => ITEMS.find(i => i.id === r.id && i.cat === "fo")) && !rows.some(r => ITEMS.find(i => i.id === r.id && (i.cat === "db" || i.cat === "fab")))) {
      recs.push({ type: "warn", title: "Standalone AI Foundry - bundle recommended",
        body: "AI Foundry without DB or Fabric is not recommended for AFO. Add at least one Database or Fabric workload to strengthen the nomination.",
        action: "Add DB or Fabric workloads" });
    }
  } else if (pct > 0 && pct < 50 && nonEligACR > 0) {
    const splitAfoEcif = Math.min(eligACR * 0.5, 500000);
        const splitStdEcif = Math.min(nonEligACR * 0.2, 250000);
    const nonEligMciPost = nonEligMci.post;

    recs.push({ type: "strategy", title: "Split into two nominations to maximize funding",
      body: `Current mix is ${pct.toFixed(0)}% eligible - below 50% threshold. Split the project:\n` +
        `\n• Project A (AFO): DB/Fabric/Foundry workloads only (${fmt(eligACR)} ACR = 100% eligible)\n` +
        `  → ECIF ${fmt(splitAfoEcif)} (cash to partner)\n` +
                `\n• Project B: Non-eligible workloads (${fmt(nonEligACR)} ACR) - choose ONE:\n` +
        `  Option 1: Standard ECIF ~${fmt(splitStdEcif)} (cash, field-led, ~5:1 ROI)\n` +
        `  Option 2: MCI Partner Nominated ${fmt(nonEligMciPost)} (cash, partner-led, ${nonEligMci.ts || "N/A"})\n` +
        `  ⚠ ECIF and MCI cannot be used on the same project.\n` +
        `\nBest total cash (Option 1): ${fmt(splitAfoEcif + splitStdEcif)}` +
        `\nBest total cash (Option 2): ${fmt(splitAfoEcif + nonEligMciPost)}` +
        (nonEligMci.pre > 0 ? `\n+ MCI Pre-sales ${fmt(nonEligMci.pre)} can be added as separate assessment scope` : ""),
      action: "Submit as two separate nominations with different scopes in Azure Offer Navigator" });

    recs.push({ type: "alt", title: "Alternative: Single Standard ECIF (no split)",
      body: `Submit everything as one Standard ECIF project (${fmt(tot)} ACR) via Azure Offer Navigator. Estimated ECIF: ${fmtRange(tot)} (cash, 3:1-7:1 ROI). Simpler but less funding.`,
      action: "Field seller nominates via Azure Offer Navigator" });
  } else if (pct === 0 && tot > 0) {
    recs.push({ type: "info", title: "No AFO-eligible workloads - choose ECIF or MCI",
      body: `None of the selected workloads qualify for AFO (requires DB/Fabric/Foundry). Choose ONE per project:\n\n` +
        `• Option 1 - Standard ECIF: ${fmtRange(tot)} (cash, field-led, 3:1-7:1 ROI)\n` +
        `• Option 2 - MCI Partner Nominated: ${fmt(mci.post)} (cash, partner-led, ${mci.ts || "N/A"})` +
        (mci.pre > 0 ? `\n  + MCI Pre-sales ${fmt(mci.pre)} as separate assessment scope` : "") +
        `\n\n⚠ ECIF and MCI cannot be used on the same customer + project.`,
      action: "Field seller nominates ECIF via Azure Offer Navigator, OR partner submits MCI via Partner Center" });

    recs.push({ type: "tip", title: "Add DB, Fabric, or AI Foundry to unlock AFO",
      body: `Even a small eligible workload can flip the mix. Adding ${fmt(tot)} in DB/Fabric/Foundry would make this 50% eligible and unlock ECIF (cash to partner).`,
      action: "Explore data modernization or AI use cases with the customer" });
  }

  return recs;
}

/* Debounced input components - prevents full App re-render on every keystroke */
function DInp({ v, fn, st, ph }) {
  const [local, setLocal] = useState(v);
  const [focus, setFocus] = useState(false);
  const timer = useRef(null);
  useEffect(() => { setLocal(v); }, [v]);
  const handleChange = (e) => {
    setLocal(e.target.value);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => fn(e.target.value), 300);
  };
  return <input value={local} placeholder={ph || ""} onChange={handleChange} onFocus={() => setFocus(true)} onBlur={() => { setFocus(false); clearTimeout(timer.current); fn(local); }} style={{ border: "none", borderBottom: focus ? "1px solid #0078D4" : "1px solid transparent", background: "transparent", fontFamily: "inherit", fontSize: "inherit", fontWeight: "inherit", color: "inherit", padding: "0 2px", outline: "none", minWidth: 50, transition: "border-color 0.2s", ...st }} />;
}
function DTxt({ v, fn, st }) {
  const [local, setLocal] = useState(v);
  const [focus, setFocus] = useState(false);
  const timer = useRef(null);
  useEffect(() => { setLocal(v); }, [v]);
  const handleChange = (e) => {
    setLocal(e.target.value);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => fn(e.target.value), 400);
  };
  return <textarea value={local} onChange={handleChange} onFocus={() => setFocus(true)} onBlur={() => { setFocus(false); clearTimeout(timer.current); fn(local); }} style={{ border: focus ? "1px solid #0078D4" : "1px solid transparent", borderRadius: 4, padding: "6px 8px", background: focus ? "#fffef5" : "transparent", width: "100%", fontFamily: "inherit", fontSize: "inherit", lineHeight: "inherit", resize: "vertical", minHeight: 100, outline: "none", transition: "border-color 0.2s, background 0.2s", ...st }} />;
}

// Animated number - counts up on change
function AnimNum({ value, format, style: st }) {
  const [display, setDisplay] = useState(value);
  const prev = useRef(value);
  const raf = useRef(null);
  useEffect(() => {
    const from = prev.current;
    const to = value;
    if (from === to) return;
    const start = performance.now();
    const duration = 400;
    const animate = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic
      setDisplay(Math.round(from + (to - from) * ease));
      if (t < 1) raf.current = requestAnimationFrame(animate);
    };
    raf.current = requestAnimationFrame(animate);
    prev.current = to;
    return () => cancelAnimationFrame(raf.current);
  }, [value]);
  return <span style={st}>{format ? format(display) : display}</span>;
}

    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    try {
      const data = await file.arrayBuffer();
      const XLSX = window.XLSX;
      if (!XLSX) { alert("Excel library not loaded. Please refresh the page and try again."); return; }
      const wb = XLSX.read(data);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      
      // Find header row (contains "Service type")
      let headerIdx = rows.findIndex(r => r && r.some && r.some(c => String(c).includes("Service type")));
      if (headerIdx < 0) headerIdx = 2; // default row 3 (0-indexed = 2)
      
      const parsed = [];
      const networkingTotal = { mo: 0, found: false };
      
      for (let i = headerIdx + 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || !row[1]) continue;
        const serviceType = String(row[1] || "").trim();
        const desc = String(row[4] || "").trim();
        const monthlyCost = parseFloat(row[5]) || 0;
        if (!serviceType || serviceType === "Support" || monthlyCost === 0) continue;
        
        // Find matching map entry
        const mapEntry = EXCEL_MAP.find(m => m.match(serviceType, desc));
        if (!mapEntry) {
          parsed.push({ serviceType, desc: desc.substring(0, 80), monthlyCost, mapped: null, id: null, status: "unmapped" });
          continue;
        }
        
        // Networking items get aggregated
        if (mapEntry.id === "networking") {
          networkingTotal.mo += monthlyCost;
          networkingTotal.found = true;
          continue;
        }
        
        const itm = ITEMS.find(item => item.id === mapEntry.id);
        if (!itm) continue;
        
        const qty = mapEntry.extractQty(desc);
        parsed.push({
          serviceType,
          desc: desc.substring(0, 80) + (desc.length > 80 ? "..." : ""),
          monthlyCost,
          mapped: itm.name,
          id: mapEntry.id,
          qty,
          status: "mapped"
        });
      }
      
      // Add aggregated networking
      if (networkingTotal.found) {
        parsed.push({
          serviceType: "Networking (aggregated)",
          desc: "Firewall + DDoS + Bastion + Load Balancer + Bandwidth etc.",
          monthlyCost: networkingTotal.mo,
          mapped: "Azure Networking",
          id: "networking",
          qty: 0,
          status: "mapped"
        });
      }
      
      setImportPreview(parsed);
    } catch (err) {
      console.error("Excel parse error:", err);
      alert("Could not parse Excel file. Make sure it is an Azure Pricing Calculator export (.xlsx).");

                afoAcr += mo * 12;
                const riLabel = t === "SQL Server" ? " with 1yr RI + AHUB" : " with 1yr RI";
                items.push({ name: n + " (" + totalVcores + " vCores" + riLabel + ")", acr: mo * 12, afo: true, why: instances + " instances x " + vcoresPerInst + " vCores each = " + totalVcores + " total vCores" + (t === "SQL Server" ? ". AHUB requires Software Assurance - verify with customer" : ". Adjust per instance sizing after assessment") });
              }
            });
            if (qAns.viewers) {
              const sku = viewerSku[qAns.viewers];
              const acr = viewerAcr[qAns.viewers] * 12;
              afoAcr += acr;
              const whyViewer = qAns.viewers === "<50" ? "F8 ($625/mo) for small teams - basic capacity for dev/test and light reporting"
                : qAns.viewers === "50-200" ? "F32 ($3,240/mo) for mid-size reporting - handles concurrent queries across 50-200 viewers"
                : qAns.viewers === "200-500" ? "F64 ($8,276/mo) for 200-500 viewers - includes free Fabric viewer access, eliminates need for Power BI Pro licenses per viewer"
                : "F128 ($16,273/mo) for 500+ viewers - highest concurrency, includes free viewer access at scale";
              items.push({ name: "Microsoft Fabric " + sku, acr, afo: true, why: whyViewer });
            }
            if (qAns.aiInterest === "yes") {
              afoAcr += 30000 + 9000;
              items.push({ name: "Azure OpenAI Standard (10M tokens/mo)", acr: 30000, afo: true, why: "10M tokens/mo supports ~500 daily queries at ~700 tokens each. Covers a production chatbot or document search scenario" });
              items.push({ name: "AI Search S1 (3 replicas)", acr: 9000, afo: true, why: "S1 with 3 replicas provides high-availability for RAG grounding. Required for production SLA (99.9%)" });
            } else if (qAns.aiInterest === "maybe") {
              afoAcr += 15000;
              items.push({ name: "Azure OpenAI Standard (5M tokens/mo)", acr: 15000, afo: true, why: "5M tokens/mo for POC and exploration during assessment phase. Scale up after validating use-case" });
            }
            // Storage based on data volume
            const storageMap = { "small": { tb: 1, mo: 23 }, "medium": { tb: 5, mo: 23*5 }, "large": { tb: 10, mo: 23*10 }, "xlarge": { tb: 50, mo: 23*50 } };
            const sv = storageMap[qAns.dataVolume] || storageMap["small"];
            otherAcr += sv.mo * 12;
            items.push({ name: "Azure Storage (" + sv.tb + " TB, Hot)", acr: sv.mo * 12, afo: false, why: sv.tb + " TB estimated based on " + (qAns.dataVolume === "small" ? "under 100GB" : qAns.dataVolume === "medium" ? "100GB-1TB" : qAns.dataVolume === "large" ? "1-10TB" : "10TB+") + " total data volume. Adjust tier (Hot/Cool/Archive) based on access patterns" });

            // RTI based on realtime needs
            if (qAns.realtime === "realtime") {
              afoAcr += 3240 * 12;
              items.push({ name: "Real-Time Intelligence (F32)", acr: 3240 * 12, afo: true, why: "F32 capacity for streaming analytics and live dashboards. AFO eligible as Fabric workload" });
            } else if (qAns.realtime === "nearrt") {
              afoAcr += 625 * 12;
              items.push({ name: "Real-Time Intelligence (F8)", acr: 625 * 12, afo: true, why: "F8 capacity for near real-time refresh. Smaller SKU sufficient for minute-level updates" });
            }

            // Integration based on middleware answer
            if (qAns.integration === "biztalk") {
              otherAcr += 185 * 5 * 12 + 10 * 10 * 12;
              items.push({ name: "Logic Apps Standard (5 workflows)", acr: 185 * 5 * 12, afo: false, why: "5 Standard WS1 workflows as BizTalk replacement. Each workflow handles one integration pattern (message routing, transformation, orchestration)" });
              items.push({ name: "Service Bus Standard (10M msg)", acr: 10 * 10 * 12, afo: false, why: "Standard tier for message queuing and pub/sub. Decouples systems during and after migration from BizTalk" });
            } else if (qAns.integration === "basic") {
              otherAcr += 185 * 2 * 12;
              items.push({ name: "Logic Apps Standard (2 workflows)", acr: 185 * 2 * 12, afo: false, why: "2 Standard workflows to replace scheduled jobs and file transfers with managed, monitored pipelines" });
            }

            const totalInst = instances * (dbTypes.length || 1);
            const monitorGB = Math.max(200, totalInst * 30);
            const defCount = Math.max(5, totalInst);
            const infraItems = [
              { name: "Azure Monitor", acr: monitorGB * 3 * 12, why: monitorGB + "GB/mo log ingestion - ~30GB per instance across " + totalInst + " workloads" },
              { name: "Azure Networking", acr: 24000, why: "ExpressRoute (~$1.5K/mo) + Azure Firewall (~$500/mo) for hybrid connectivity to on-prem during migration" },
              { name: "Defender for Cloud P2", acr: defCount * 15 * 12, why: "Plan 2 for " + defCount + " servers - vulnerability assessment, agentless scanning, adaptive hardening" },
            ];
            infraItems.forEach(i => { otherAcr += i.acr; items.push({ ...i, afo: false }); });
            const total = afoAcr + otherAcr;
            const pct = total > 0 ? (afoAcr/total*100) : 0;
            const eligible = pct >= 50;
            const ecif = eligible ? Math.min(total*0.5, 500000) : 0;
            return (
              <div>
                <div style={{ background: eligible ? "#ecfdf5" : "#fffbeb", border: "1.5px solid " + (eligible ? "#6ee7b7" : "#fcd34d"), borderRadius: 10, padding: "14px 16px", marginBottom: 12, textAlign: "center" }}>
                  <div style={{ fontSize: 20, fontWeight: 700, color: eligible ? "#059669" : "#b45309" }}>{eligible ? "AFO Eligible" : "Below AFO Threshold"}</div>
                  <div style={{ fontSize: 13, color: eligible ? "#059669" : "#b45309" }}>{pct.toFixed(0)}% eligible workloads {eligible ? "- qualifies for up to " + fmt(ecif) + " ECIF" : "- needs more DB/Fabric/AI to reach 50%"}</div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
                  <div style={{ background: "#f0f4ff", borderRadius: 8, padding: "10px", textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: "#64748b" }}>Est. Y1 ACR</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#0078D4" }}>{fmt(total)}</div>
                  </div>
                  <div style={{ background: "#ecfdf5", borderRadius: 8, padding: "10px", textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: "#64748b" }}>AFO Eligible ACR</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#059669" }}>{fmt(afoAcr)}</div>
                  </div>
                </div>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#666", marginBottom: 8 }}>Workloads to be populated:</div>
                {items.map((w, i) => (
                  <div key={i} style={{ padding: "8px 0", borderBottom: "1px solid #f5f5f5" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ width: 6, height: 6, borderRadius: 2, background: w.afo ? "#059669" : "#f59e0b", flexShrink: 0, marginTop: 1 }} />
                        <span style={{ color: "#333", fontWeight: 500 }}>{w.name}</span>
                        {w.afo && <span style={{ fontSize: 10, padding: "1px 4px", borderRadius: 4, background: "#ecfdf5", color: "#059669", fontWeight: 600 }}>AFO</span>}
                      </div>
                      <span style={{ fontWeight: 600, color: "#666", flexShrink: 0 }}>{fmt(w.acr)}/yr</span>
                    </div>
                    <div style={{ fontSize: 10, color: "#999", marginTop: 2, paddingLeft: 12 }}>{w.why}</div>
                  </div>
                ))}
                {qAns.agreement === "CSP" && <div style={{ marginTop: 10, padding: "6px 10px", background: "#fff7ed", borderRadius: 6, border: "1px solid #fed7aa", fontSize: 11, color: "#b45309" }}>Note: CSP uses MCI Partner path. AFO requires EA or MCA-E.</div>}
              </div>
            );
          }, valid: () => true },
        ];
        const q = qs[qStep];
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(10,22,40,0.7)", backdropFilter: "blur(4px)", WebkitBackdropFilter: "blur(4px)", zIndex: 99998, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
            <div style={{ maxWidth: 520, width: "100%", background: "white", borderRadius: 12, overflow: "hidden", maxHeight: "90vh", display: "flex", flexDirection: "column", boxShadow: "0 20px 60px rgba(0,0,0,0.3)", animation: "fadeSlide 0.25s ease" }}>
              <div style={{ background: HDR, padding: "16px 24px", color: "white" }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>AFO Pre-Assessment</div>
                <div style={{ fontSize: 11, opacity: 0.6 }}>Estimate funding potential in 5 questions</div>
              </div>
              <div style={{ padding: "4px 24px 0", overflowY: "auto", flex: 1 }}>
                <div style={{ display: "flex", gap: 4, margin: "12px 0" }}>
                  {qs.map((_, i) => <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= qStep ? "#0078D4" : "#e0e0e0", transition: "background 0.3s" }} />)}
                </div>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#0078D4", textTransform: "uppercase", letterSpacing: 0.5 }}>{qStep < qs.length - 1 ? "Question " + (qStep + 1) + " of " + (qs.length - 1) : "Estimate"}</div>
                <div style={{ fontSize: 16, fontWeight: 600, color: "#1a1a2e", marginBottom: 2 }}>{q.title}</div>
                <div style={{ fontSize: 12, color: "#999", marginBottom: 12 }}>{q.sub}</div>
                {q.render()}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "14px 24px", borderTop: "1px solid #f0f0f0", marginTop: 14 }}>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setShowQuest(false)} style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #ddd", background: "white", color: "#999", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
                  {qStep > 0 && <button onClick={() => setQStep(qStep - 1)} style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #ddd", background: "white", color: "#666", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Back</button>}
                </div>
                {qStep < qs.length - 1 ? (
                  <button onClick={() => setQStep(qStep + 1)} disabled={!q.valid()} style={{ padding: "8px 20px", borderRadius: 8, border: "none", background: q.valid() ? "#0078D4" : "#e0e0e0", color: q.valid() ? "white" : "#999", fontSize: 12, fontWeight: 600, cursor: q.valid() ? "pointer" : "default", fontFamily: "inherit" }}>Next</button>
                ) : (
                  <button onClick={applyQuestionnaire} disabled={!q.valid()} style={{ padding: "8px 20px", borderRadius: 8, border: "none", background: q.valid() ? "linear-gradient(135deg, #059669, #34d399)" : "#e0e0e0", color: q.valid() ? "white" : "#999", fontSize: 12, fontWeight: 700, cursor: q.valid() ? "pointer" : "default", fontFamily: "inherit" }}>Apply to Estimator</button>
                )}
              </div>
            </div>
          </div>
        );
      })()}


      {/* What's New Modal */}
      {showChangelog && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(10,22,40,0.7)", backdropFilter: "blur(4px)", WebkitBackdropFilter: "blur(4px)", zIndex: 99997, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ maxWidth: 480, width: "100%", background: "white", borderRadius: 12, overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.3)", maxHeight: "80vh", display: "flex", flexDirection: "column" }}>
            <div style={{ background: HDR, padding: "16px 24px", color: "white", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 600 }}>What's New</div>
                <div style={{ fontSize: 11, opacity: 0.5 }}>v2.0 - March 2026</div>
              </div>
              <button onClick={() => setShowChangelog(false)} style={{ background: "rgba(255,255,255,0.2)", border: "none", color: "white", borderRadius: 8, padding: "4px 10px", cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>Close</button>
            </div>
            <div style={{ padding: "16px 24px", overflowY: "auto", flex: 1 }}>
              {[
                { icon: "🎯", title: "AFO Pre-Assessment", desc: "8 questions to estimate funding potential before the workshop" },
                { icon: "📈", title: "Consumption Ramp Timeline", desc: "Visual chart showing when each service starts consuming and monthly ACR build-up" },
                { icon: "📋", title: "Funding Justification", desc: "Auto-generated section covering Strategic Alignment, Risk, ROI and Program fit for nominations" },
                { icon: "⬇", title: "Export / Import Cases", desc: "Save cases as JSON files and share with colleagues or load on another device" },
                { icon: "🔗", title: "BizTalk Migration Scenario", desc: "Logic Apps + Service Bus + APIM + Functions preset" },
                { icon: "🔍", title: "Sentinel SIEM/SOC Scenario", desc: "Sentinel 500GB + Defender P2 + SOAR playbooks preset" },
                { icon: "⚡", title: "3 New Workloads", desc: "Logic Apps, Service Bus, Event Grid added under Azure Accelerate" },
                { icon: "📊", title: "Strategy-Aware SOW", desc: "Top bar adapts to show AFO or MCI path based on your workloads" },
                { icon: "🔒", title: "Access Code", desc: "Password protection for partner and field use" },
                { icon: "✨", title: "Design Polish", desc: "Consolidated typography, spacing, and colors for a cleaner look" },
              ].map((item, i) => (
                <div key={i} style={{ display: "flex", gap: 12, padding: "10px 0", borderBottom: i < 9 ? "1px solid #f0f0f0" : "none" }}>
                  <span style={{ fontSize: 20, flexShrink: 0, marginTop: 2 }}>{item.icon}</span>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#333" }}>{item.title}</div>
                    <div style={{ fontSize: 11, color: "#999", marginTop: 2 }}>{item.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Excel Import Preview Modal */}
      {importPreview && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ background: "white", borderRadius: 12, maxWidth: 700, width: "100%", maxHeight: "80vh", overflow: "hidden", display: "flex", flexDirection: "column", boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
            <div style={{ padding: "16px 20px", background: HDR, color: "white" }}>
              <div style={{ fontSize: 16, fontWeight: 600 }}>Import from Azure Pricing Calculator</div>
              <div style={{ fontSize: 12, opacity: 0.7, marginTop: 2 }}>{importPreview.filter(p => p.status === "mapped").length} services mapped · {importPreview.filter(p => p.status === "unmapped").length} unmapped</div>
            </div>
            <div style={{ overflow: "auto", flex: 1, padding: "0" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead>
                  <tr style={{ background: "#f5f7fa", position: "sticky", top: 0 }}>
                    <th style={{ padding: "8px 10px", textAlign: "left", borderBottom: "2px solid #ddd", fontWeight: 600 }}>Excel Service</th>
                    <th style={{ padding: "8px 10px", textAlign: "left", borderBottom: "2px solid #ddd", fontWeight: 600 }}>Mapped To</th>
                    <th style={{ padding: "8px 10px", textAlign: "right", borderBottom: "2px solid #ddd", fontWeight: 600 }}>$/mo</th>
                    <th style={{ padding: "8px 10px", textAlign: "center", borderBottom: "2px solid #ddd", fontWeight: 600 }}>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {importPreview.map((p, i) => (
                    <tr key={i} style={{ background: i % 2 ? "#fafafa" : "white", opacity: p.status === "unmapped" ? 0.5 : 1 }}>
                      <td style={{ padding: "6px 10px", borderBottom: "1px solid #f0f0f0" }}>
                        <div style={{ fontWeight: 500 }}>{p.serviceType}</div>
                        <div style={{ fontSize: 10, color: "#999", maxWidth: 250, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.desc}</div>
                      </td>
                      <td style={{ padding: "6px 10px", borderBottom: "1px solid #f0f0f0", color: p.mapped ? "#0078D4" : "#ccc" }}>{p.mapped || "-"}</td>
                      <td style={{ padding: "6px 10px", borderBottom: "1px solid #f0f0f0", textAlign: "right", fontWeight: 600 }}>{fmt(p.monthlyCost)}</td>
                      <td style={{ padding: "6px 10px", borderBottom: "1px solid #f0f0f0", textAlign: "center" }}>
                        {p.status === "mapped" ? <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: "#ecfdf5", color: "#059669", fontWeight: 600 }}>Mapped</span>
                        : <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, background: "#fef2f2", color: "#dc2626", fontWeight: 600 }}>Unmapped</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{ padding: "12px 20px", borderTop: "1px solid #e8e8ec", display: "flex", justifyContent: "space-between", alignItems: "center", background: "#fafafa" }}>
              <div style={{ fontSize: 11, color: "#999" }}>Unmapped services will be skipped. Prices from Excel override tool defaults.</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setImportPreview(null)} style={{ padding: "6px 16px", background: "white", border: "1px solid #ddd", borderRadius: 6, fontSize: 12, cursor: "pointer", color: "#666" }}>Cancel</button>
                <button onClick={applyImport} style={{ padding: "6px 16px", background: "#0078D4", color: "white", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Apply {importPreview.filter(p => p.status === "mapped").length} services</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
