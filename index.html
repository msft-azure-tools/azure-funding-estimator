/* MCI: Azure Accelerate Partner Nominated — verified from MCI Guide effective March 1, 2026.
   Market A (Sweden). Pre-sales = Assessment & POV. Post-sales = Deployment.
   Source: Microsoft Commercial Partner Incentives Guide, 9 March 2026. */
function getMCI(acr) {
  let pre = 0, preL = "", post = 0, postL = "", ts = "", days = 0;
  if (acr >= 250000) { pre = 25000; preL = "Large (>$250K)"; }
  else if (acr >= 15000) { pre = 15000; preL = "Standard ($15K-$250K)"; }
  if (acr >= 250000) { post = 75000; postL = "$250K-$500K+"; ts = "L"; days = 260; }
  else if (acr >= 100000) { post = 35000; postL = "$100K-$250K"; ts = "M"; days = 200; }
  else if (acr >= 50000) { post = 15000; postL = "$50K-$100K"; ts = "S"; days = 120; }
  else if (acr >= 15000) { post = 6500; postL = "$15K-$50K"; ts = "XS"; days = 120; }
  else if (acr >= 5000) { post = 2000; postL = "$5K-$15K"; ts = "XXS"; days = 120; }
  return { pre, preL, post, postL, ts, days };
}

/* Smart Funding Recommendation Engine
   Analyzes workload mix and suggests optimal funding strategy to maximize total funding.
   Returns array of recommendation objects. */
function getRecommendation(el, ot, tot, pct, ok, rows, mci, stdEcif) {
  const recs = [];
  if (tot === 0) return recs;

  const nonEligACR = ot;
  const eligACR = el;
  const nonEligMci = getMCI(nonEligACR);

  if (ok) {
    const afoEcif = Math.min(tot * 0.5, 500000);
    const afoAco = Math.min(tot * 0.5, 500000);
    recs.push({ type: "success", title: "AFO eligible — submit as single nomination",
      body: `All workloads qualify as one AFO project. ECIF ${fmt(afoEcif)} (cash to partner) + ACO ${fmt(afoAco)} (credits to customer).`,
      action: "Submit via Azure Offer Navigator (field seller nominates)" });

    if (mci.pre > 0) {
      recs.push({ type: "tip", title: "Stack MCI pre-sales for additional " + fmt(mci.pre),
        body: `Partner can self-nominate a separate Assessment+POV (${mci.preL}) for ${fmt(mci.pre)} via Partner Center. This does NOT conflict with AFO post-sales.`,
        action: "Partner submits MCI pre-sales claim independently" });
    }

    if (rows.some(r => ITEMS.find(i => i.id === r.id && i.cat === "fo")) && !rows.some(r => ITEMS.find(i => i.id === r.id && (i.cat === "db" || i.cat === "fab")))) {
      recs.push({ type: "warn", title: "Standalone AI Foundry — bundle recommended",
        body: "AI Foundry without DB or Fabric is not recommended for AFO. Add at least one Database or Fabric workload to strengthen the nomination.",
        action: "Add DB or Fabric workloads" });
    }
  } else if (pct > 0 && pct < 50 && nonEligACR > 0) {
    const splitAfoEcif = Math.min(eligACR * 0.5, 500000);
    const splitAfoAco = Math.min(eligACR * 0.5, 500000);
    const splitStdEcif = Math.min(nonEligACR * 0.2, 250000);
    const nonEligMciPost = nonEligMci.post;

    recs.push({ type: "strategy", title: "Split into two nominations to maximize funding",
      body: `Current mix is ${pct.toFixed(0)}% eligible — below 50% threshold. Split the project:\n` +
        `\n• Project A (AFO): DB/Fabric/Foundry workloads only (${fmt(eligACR)} ACR = 100% eligible)\n` +
        `  → ECIF ${fmt(splitAfoEcif)} (cash to partner)\n` +
        `  → ACO ${fmt(splitAfoAco)} (credits to customer)\n` +
        `\n• Project B: Non-eligible workloads (${fmt(nonEligACR)} ACR) — choose ONE:\n` +
        `  Option 1: Standard ECIF ~${fmt(splitStdEcif)} (cash, field-led, ~5:1 ROI)\n` +
        `  Option 2: MCI Partner Nominated ${fmt(nonEligMciPost)} (cash, partner-led, ${nonEligMci.ts || "N/A"})\n` +
        `  ⚠ ECIF and MCI cannot be used on the same project.\n` +
        `\nBest total cash (Option 1): ${fmt(splitAfoEcif + splitStdEcif)}` +
        `\nBest total cash (Option 2): ${fmt(splitAfoEcif + nonEligMciPost)}` +
        (nonEligMci.pre > 0 ? `\n+ MCI Pre-sales ${fmt(nonEligMci.pre)} can be added as separate assessment scope` : ""),
      action: "Submit as two separate nominations with different scopes in Azure Offer Navigator" });

    recs.push({ type: "alt", title: "Alternative: Single Standard ECIF (no split)",
      body: `Submit everything as one Standard ECIF project (${fmt(tot)} ACR) via Azure Offer Navigator. Estimated ECIF: ~${fmt(stdEcif)} (cash, 5:1 ROI). No ACO. Simpler but less funding.`,
      action: "Field seller nominates via Azure Offer Navigator" });
  } else if (pct === 0 && tot > 0) {
    recs.push({ type: "info", title: "No AFO-eligible workloads — choose ECIF or MCI",
      body: `None of the selected workloads qualify for AFO (requires DB/Fabric/Foundry). Choose ONE per project:\n\n` +
        `• Option 1 — Standard ECIF: ~${fmt(stdEcif)} (cash, field-led, ~5:1 ROI)\n` +
        `• Option 2 — MCI Partner Nominated: ${fmt(mci.post)} (cash, partner-led, ${mci.ts || "N/A"})` +
        (mci.pre > 0 ? `\n  + MCI Pre-sales ${fmt(mci.pre)} as separate assessment scope` : "") +
        `\n\n⚠ ECIF and MCI cannot be used on the same customer + project.`,
      action: "Field seller nominates ECIF via Azure Offer Navigator, OR partner submits MCI via Partner Center" });

    recs.push({ type: "tip", title: "Add DB, Fabric, or AI Foundry to unlock AFO",
      body: `Even a small eligible workload can flip the mix. Adding ${fmt(tot)} in DB/Fabric/Foundry would make this 50% eligible and unlock ECIF (cash to partner) + ACO (credits to customer).`,
      action: "Explore data modernization or AI use cases with the customer" });
  }

  return recs;
}

  };

  // Detect which accel sub-types are present
  const hasInfra = rows.some(r => ["infra-linux","infra-win","infra-mdc"].includes(r.id));
  const hasSap = rows.some(r => r.id === "sap");

  // Collect active categories
  const cats = [];
  if (db) cats.push("db");
  if (fab) cats.push("fab");

  if (hasInfra) cats.push("infra");
  if (hasSap) cats.push("sap");
  if (hasAvs) cats.push("avs");
  if (hasAvd) cats.push("avd");
  if (hasAks) cats.push("aks");

  if (cats.length === 0) return { scope: "[Select workloads to generate scope]", ms: [] };

  // Build purpose
  const purposes = cats.map(c => B[c].p);
  let s = "Purpose: " + purposes.join("; and ") + " for " + cust + ".\n\n";

  // Architecture
  s += "Architecture:\n";
  cats.forEach(c => { B[c].a.forEach(a => { s += "- " + a + "\n"; }); });

  // Commercial impact
  s += "\nCommercial impact (Year 1):\n";
  rows.forEach((r) => { s += "- " + r.name + (r.sku ? " (" + r.sku + ")" : "") + ": ~" + fmt(r.mo) + "/mo\n"; });
  if (rows.length) s += "- Total: ~" + fmt(tot / 12) + "/mo (" + fmt(tot) + "/yr)\n";

  // Deliverables
  s += "\nDeliverables:\n";
  cats.forEach(c => { B[c].d.forEach(d => { s += "- " + d + "\n"; }); });

  s += "\nGoal: Help " + cust + " establish a production-ready, governed Azure platform.";

  // Pick milestones: dominant category if single, "multi" if 2+
  const msKey = cats.length === 1 ? cats[0] : "multi";
  const ms = M[msKey] || M.multi;

  return { scope: s, ms };
}

/* Debounced input components — prevents full App re-render on every keystroke */
function DInp({ v, fn, st }) {
  const [local, setLocal] = useState(v);
  const timer = useRef(null);
  useEffect(() => { setLocal(v); }, [v]);
  const handleChange = (e) => {
    setLocal(e.target.value);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => fn(e.target.value), 300);
  };
  return <input value={local} onChange={handleChange} onBlur={() => { clearTimeout(timer.current); fn(local); }} style={{ border: "none", borderBottom: "1px dashed #bbb", background: "transparent", fontFamily: "inherit", fontSize: "inherit", fontWeight: "inherit", color: "inherit", padding: "0 2px", outline: "none", minWidth: 50, ...st }} />;
}
function DTxt({ v, fn, st }) {
  const [local, setLocal] = useState(v);
  const timer = useRef(null);
  useEffect(() => { setLocal(v); }, [v]);
  const handleChange = (e) => {
    setLocal(e.target.value);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => fn(e.target.value), 400);
  };
  return <textarea value={local} onChange={handleChange} onBlur={() => { clearTimeout(timer.current); fn(local); }} style={{ border: "1px dashed #ccc", borderRadius: 4, padding: "6px 8px", background: "#fffef5", width: "100%", fontFamily: "inherit", fontSize: "inherit", lineHeight: "inherit", resize: "vertical", minHeight: 100, outline: "none", ...st }} />;
}

      if (field === "on" && val && !cur.mo) {
        n.qty = itm.dq || 1;
        n.sku = itm.dsku || "";
        n.ri = cur.ri || false;
        n.mo = itm.fab ? skuMo(itm.dsku, n.ri) : (itm.dq * itm.up);
      }
      if (field === "qty" && !itm.fab) {
        const activeOpt = itm.riOpts && n.riTerm && n.riTerm !== "payg" ? itm.riOpts.find(o => o.k === n.riTerm) : null;
        n.mo = val * (activeOpt ? activeOpt.up : itm.up);
      }
      if (field === "sku" && itm.fab) n.mo = skuMo(val, n.ri) * (n.qty || 1);
      if (field === "qty" && itm.fab) n.mo = skuMo(n.sku || itm.dsku, n.ri) * val;
      if (field === "ri" && itm.fab) n.mo = skuMo(n.sku || itm.dsku, val) * (n.qty || 1);
      if (field === "riTerm" && itm.riOpts) {
        const opt = itm.riOpts.find(o => o.k === val);

      }

    const tot = el + ot; // ACR only (excludes XCR)

    const recs = getRecommendation(el, ot, tot, pct, ok, rows, mci, stdEcif);

      recCredits = splitAfoAco;
      recStrategy = "Split";
